services:

  # ---------------------------------------------------------------------------
  # nginx – statischer Webserver + Reverse Proxy
  # Serviert alle App-Bundles und leitet API-Requests weiter
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: lernheld-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - .:/var/www/html:ro          # Ganzes Repo read-only mounten
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Zugriff auf PocketBase auf dem Host
    depends_on:
      - live-proxy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # live-proxy – WebSocket-Proxy für die Gemini Live API
  # Versteckt den API-Key, leitet Browser-WS an Gemini weiter
  # ---------------------------------------------------------------------------
  live-proxy:
    build: ./live-proxy
    container_name: lernheld-live-proxy
    restart: unless-stopped
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      # Optional: nur bestimmte Origins erlauben
      # - ALLOWED_ORIGINS=https://lernheld.synology.me
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
