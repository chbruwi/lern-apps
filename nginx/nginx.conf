server {
    listen 80;
    server_name _;

    # Repo-Root ist als /var/www/html gemountet
    root /var/www/html;

    # ---------------------------------------------------------------------------
    # Landing Page
    # ---------------------------------------------------------------------------
    location = / {
        try_files /index.html =404;
    }

    # ---------------------------------------------------------------------------
    # Apps – nur die kompilierten index.html Bundles ausliefern
    # Quellcode (src/, node_modules/ etc.) bleibt unerreichbar
    # ---------------------------------------------------------------------------
    location ~ ^/(franzoesisch|wort-abenteuer|vocabhero|mathe-held|spielecke|eltern-panel)(/?)$ {
        try_files /$1/index.html =404;
    }

    # ---------------------------------------------------------------------------
    # PocketBase – Admin UI + REST API
    # ---------------------------------------------------------------------------
    location ~ ^/(api|_)/ {
        proxy_pass         http://host.docker.internal:8090;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # PocketBase SSE (Realtime-API)
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
    }

    # ---------------------------------------------------------------------------
    # Gemini Live API – WebSocket Proxy + Health-Check + Model-Diagnose
    # ---------------------------------------------------------------------------
    location = /live-health {
        proxy_pass http://live-proxy:3001/health;
    }

    location = /live-models {
        proxy_pass http://live-proxy:3001/list-models;
    }

    location /live {
        proxy_pass         http://live-proxy:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;   # Lange Sessions erlauben
        proxy_send_timeout 3600s;
    }

    # ---------------------------------------------------------------------------
    # Alles andere blockieren (kein Zugriff auf Quellcode)
    # ---------------------------------------------------------------------------
    location / {
        return 404;
    }

    # Gzip für schnellere Ladezeiten
    gzip            on;
    gzip_types      text/html text/css application/javascript application/json;
    gzip_min_length 1024;
}
